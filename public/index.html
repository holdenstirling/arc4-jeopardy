<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arc4 Jeopardy</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #0d1b5e 0%, #1a237e 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 40px 24px;
  }
  h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    color: #f5c518;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 12px;
  }
  .subtitle {
    color: rgba(255,255,255,0.55);
    font-size: 1rem;
    margin-bottom: 56px;
    text-align: center;
  }
  .cards {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 720px;
  }
  .card {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 36px 32px;
    width: 300px;
    text-decoration: none;
    color: #fff;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    text-align: center;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: #f5c518;
    background: rgba(255,255,255,0.1);
  }
  .card-icon { font-size: 2.8rem; margin-bottom: 16px; }
  .card h2 { font-size: 1.2rem; font-weight: 800; margin-bottom: 8px; }
  .card p { font-size: 0.85rem; color: rgba(255,255,255,0.55); line-height: 1.5; }
  .card.primary { border-color: rgba(245,197,24,0.35); background: rgba(245,197,24,0.07); }
  .card.primary:hover { background: rgba(245,197,24,0.14); }
  footer {
    margin-top: 64px;
    color: rgba(255,255,255,0.2);
    font-size: 0.78rem;
    text-align: center;
  }
</style>
</head>
<body>
  <h1>⚡ Arc4 Jeopardy</h1>
  <p class="subtitle">Team trivia for smart people</p>

  <div class="cards">
    <a href="/play.html" class="card primary">
      <div class="card-icon">🎮</div>
      <h2>Play Current Game</h2>
      <p>Open the latest trivia game and start playing with your team right now.</p>
    </a>
    <a href="/builder.html" class="card">
      <div class="card-icon">🛠️</div>
      <h2>Build a New Game</h2>
      <p>Create a custom Jeopardy game — fill in categories and clues, then download the HTML file.</p>
    </a>
  </div>

  <footer>Arc4 &mdash; Internal Tools</footer>
</body>
</html>
